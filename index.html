<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Quét QR SV7</title>

  <!-- CDN ổn định cho GitHub Pages: không cần đặt file html5-qrcode.min.js cùng thư mục -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root{
      --primary:#0b5ed7;
      --muted:#666;
      --ok-bg:#e6f4ea;
      --ok-text:#0b6b2f;
      --err-bg:#fdecea;
      --err-text:#7a1b1b;
      --warn-bg:#fff8e1;
      --warn-text:#7a5700;
    }
    *{box-sizing:border-box}
    body{
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      margin:0;
      padding:14px;
      background:#f5f7fb;
      color:#111;
    }
    .card{
      max-width:560px;
      margin:10px auto;
      background:#fff;
      padding:16px;
      border-radius:14px;
      box-shadow:0 8px 28px rgba(12,20,30,0.08);
    }
    h1{margin:0 0 10px;font-size:1.08rem;line-height:1.25}
    .row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
    label{font-weight:650;font-size:14px}
    input[type="time"],select{
      padding:8px 10px;
      border-radius:8px;
      border:1px solid #d0d7de;
      background:#fff;
      min-height:38px;
    }
    select{max-width:100%;}
    button{
      padding:10px 14px;
      border-radius:9px;
      border:none;
      background:var(--primary);
      color:#fff;
      font-weight:750;
      cursor:pointer;
      min-height:40px;
    }
    button.secondary{background:#6c757d}
    button.warning{background:#b7791f}
    button:disabled{opacity:.55;cursor:not-allowed}
    #reader-container{
      margin-top:12px;
      border-radius:12px;
      overflow:hidden;
      display:none;
      border:1px solid #e6e9ee;
      background:#000;
    }
    #reader{
      width:100%;
      min-height:390px;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }
    #reader video{
      width:100%!important;
      height:100%!important;
      object-fit:cover;
      display:block;
    }
    .scan-guide{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:min(78vw,330px);
      height:min(78vw,330px);
      border:3px solid rgba(255,255,255,.85);
      border-radius:18px;
      pointer-events:none;
      box-shadow:0 0 0 999px rgba(0,0,0,.20);
      z-index:5;
    }
    .scan-guide:before,.scan-guide:after{
      content:"";
      position:absolute;
      width:42px;
      height:42px;
      border-color:#00e676;
      border-style:solid;
    }
    .scan-guide:before{left:-3px;top:-3px;border-width:5px 0 0 5px;border-radius:18px 0 0 0}
    .scan-guide:after{right:-3px;bottom:-3px;border-width:0 5px 5px 0;border-radius:0 0 18px 0}
    .guide-text{
      position:absolute;
      left:50%;
      bottom:12px;
      transform:translateX(-50%);
      z-index:6;
      color:#fff;
      background:rgba(0,0,0,.55);
      padding:7px 10px;
      border-radius:999px;
      font-size:13px;
      white-space:nowrap;
    }
    #result{
      margin-top:12px;
      padding:11px;
      border-radius:9px;
      min-height:48px;
      font-weight:650;
      line-height:1.35;
      background:#f0f2f5;
    }
    .success{background:var(--ok-bg)!important;color:var(--ok-text);border:1px solid #cfead1}
    .error{background:var(--err-bg)!important;color:var(--err-text);border:1px solid #f5c6cb}
    .warning-box{background:var(--warn-bg)!important;color:var(--warn-text);border:1px solid #f1d98a}
    .hint{font-size:13px;color:var(--muted);margin-top:9px;line-height:1.45}
    .small{font-size:13px;color:var(--muted)}
    #cameraControls,#zoom-controls{display:none;gap:8px;align-items:center;flex-wrap:wrap}
    #zoomRange{width:170px;max-width:100%}
    ul#history{margin-top:12px;padding-left:18px;max-height:170px;overflow:auto;border-top:1px dashed #eee;padding-top:8px}
    ul#history li{margin-bottom:6px;font-size:14px;line-height:1.35}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}
  </style>
</head>
<body>
  <div class="card">
    <h1>MÁY QUÉT - CHI BỘ SV7</h1>

    <div class="row">
      <label for="startTime">Giờ bắt đầu:</label>
      <input id="startTime" type="time" value="18:00">

      <label for="sheetName">Sheet:</label>
      <select id="sheetName" title="Nếu Code.gs có hỗ trợ sheetName, dữ liệu sẽ ghi vào tab này"></select>
    </div>

    <div class="row" id="cameraControls">
      <label for="cameraSelect">Camera:</label>
      <select id="cameraSelect"></select>
      <button id="switchCameraBtn" class="secondary" type="button">Đổi camera</button>
    </div>

    <div class="row">
      <button id="startBtn" type="button">Bật camera</button>
      <button id="stopBtn" class="secondary" type="button" style="display:none">Dừng</button>
      <button id="torchBtn" class="warning" type="button" style="display:none">Bật đèn</button>
    </div>

    <div class="row" id="zoom-controls">
      <label class="small" for="zoomRange">Zoom thật</label>
      <input id="zoomRange" type="range" min="1" max="3" step="0.1" value="1">
      <button id="zoomReset" class="secondary" type="button" style="padding:8px 10px">Reset</button>
      <span id="zoomInfo" class="small"></span>
    </div>

    <div id="reader-container">
      <div id="reader">
        <div class="scan-guide"></div>
        <div class="guide-text">Đưa QR vào khung, giữ máy đứng yên 1-2 giây</div>
      </div>
    </div>

    <div id="result">Sẵn sàng quét.</div>

    <div class="hint">
      Nên mở bằng Chrome/Safari trực tiếp, không mở trong Zalo/Facebook. Với QR nhỏ trên thẻ sinh viên: bật đèn, lau camera, đưa thẻ cách camera khoảng 15-25cm, rồi dùng zoom thật 1.5x-2.5x nếu máy hỗ trợ.
    </div>

    <ul id="history"></ul>
  </div>

  <script>
    // Link Apps Script deployment mới của bạn
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEygfhTOlc-_MOqXK1G9XLl0JkYlgAheduDK3ZMTCb7VQgrxSBEgvj50jxrqI_W2pY/exec";

    const resultDiv = document.getElementById('result');
    const readerContainer = document.getElementById('reader-container');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const torchBtn = document.getElementById('torchBtn');
    const cameraControls = document.getElementById('cameraControls');
    const cameraSelect = document.getElementById('cameraSelect');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    const sheetNameSelect = document.getElementById('sheetName');
    const zoomControls = document.getElementById('zoom-controls');
    const zoomRange = document.getElementById('zoomRange');
    const zoomReset = document.getElementById('zoomReset');
    const zoomInfo = document.getElementById('zoomInfo');
    const historyList = document.getElementById('history');

    const soundSuccess = new Audio('https://actions.google.com/sounds/v1/communication/flick_scuff.ogg');
    const soundError = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

    let html5Qr = null;
    let lastScanned = "";
    let scanQueue = [];
    let isUploading = false;
    let resetTimer = null;
    let cameras = [];

    let _videoTrack = null;
    let _videoEl = null;
    let supportsZoom = false;
    let supportsTorch = false;
    let torchOn = false;

    initSheetOptions();

    function initSheetOptions() {
      const currentMonth = new Date().getMonth() + 1;
      for (let i = 1; i <= 12; i++) {
        const opt = document.createElement('option');
        opt.value = 'Tháng ' + i;
        opt.textContent = 'Tháng ' + i;
        if (i === currentMonth) opt.selected = true;
        sheetNameSelect.appendChild(opt);
      }
    }

    function setResult(text, cls) {
      resultDiv.className = cls || "";
      resultDiv.innerText = text;
    }

    function appendHistory(text) {
      const li = document.createElement('li');
      li.textContent = `${new Date().toLocaleTimeString()} — ${text}`;
      historyList.prepend(li);
    }

    function extractMssv(rawText) {
      const raw = String(rawText || '').trim();
      // Nếu QR chứa cả chuỗi dài hoặc URL, cố lấy mã số sinh viên dạng 7-10 chữ số.
      const match = raw.match(/\b\d{7,10}\b/);
      return match ? match[0] : raw;
    }

    async function sendGet(mssv, startTime, sheetName) {
      const url = new URL(APPS_SCRIPT_URL);
      url.searchParams.set('mssv', mssv);
      url.searchParams.set('startTime', startTime || '');
      url.searchParams.set('sheetName', sheetName || '');
      url.searchParams.set('_t', Date.now().toString());

      const response = await fetch(url.toString(), {
        method: 'GET',
        mode: 'cors',
        cache: 'no-store'
      });

      const text = await response.text();

      try {
        return JSON.parse(text);
      } catch (e) {
        return {
          status: 'error',
          message: 'Apps Script không trả JSON hợp lệ. Nội dung nhận được: ' + text.slice(0, 180)
        };
      }
    }

    async function processQueue() {
      if (scanQueue.length === 0 || isUploading) return;
      isUploading = true;
      const task = scanQueue.shift();

      try {
        const resp = await sendGet(task.mssv, task.startTime, task.sheetName);

        if (resp && resp.status === 'ok') {
          const msg = resp.message || ('Đã điểm danh MSSV ' + task.mssv);
          setResult(msg, 'success');
          try { soundSuccess.play().catch(()=>{}); } catch(e){}
          appendHistory(msg);
        } else {
          const msg = (resp && resp.message) ? resp.message : 'Lỗi server không xác định';
          setResult(msg, 'error');
          try { soundError.play().catch(()=>{}); } catch(e){}
          appendHistory('Lỗi: ' + msg);
        }
      } catch (e) {
        const msg = 'Lỗi kết nối Apps Script: ' + (e.message || e);
        setResult(msg, 'error');
        try { soundError.play().catch(()=>{}); } catch(err){}
        appendHistory(msg);
      } finally {
        isUploading = false;
        clearTimeout(resetTimer);
        resetTimer = setTimeout(() => {
          if (scanQueue.length === 0 && resultDiv.className !== 'error') {
            setResult('Sẵn sàng quét.');
          }
        }, 1500);
        setTimeout(processQueue, 200);
      }
    }

    function onScanSuccess(decodedText) {
      if (!decodedText) return;

      const mssv = extractMssv(decodedText);
      if (!mssv || mssv === lastScanned) return;

      lastScanned = mssv;

      const startTime = document.getElementById('startTime').value || '';
      const sheetName = sheetNameSelect.value || '';

      setResult('Đã nhận mã: ' + mssv + (decodedText !== mssv ? '\nQR gốc: ' + decodedText : ''), 'success');
      try { soundSuccess.play().catch(()=>{}); } catch(e){}
      if (navigator.vibrate) navigator.vibrate(100);

      scanQueue.push({ mssv, startTime, sheetName });
      processQueue();

      setTimeout(() => { lastScanned = ''; }, 2500);
    }

    function buildScanConfig() {
      const config = {
        fps: 12,
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
          const size = Math.floor(minEdge * 0.78);
          return { width: size, height: size };
        },
        aspectRatio: 1.7777778,
        disableFlip: false,
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: true
        }
      };

      if (typeof Html5QrcodeSupportedFormats !== 'undefined') {
        config.formatsToSupport = [Html5QrcodeSupportedFormats.QR_CODE];
      }

      return config;
    }

    function buildCameraConstraints(deviceId, exactDevice) {
      const constraints = {
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        frameRate: { ideal: 30, max: 30 }
      };

      if (deviceId) {
        constraints.deviceId = exactDevice ? { exact: deviceId } : { ideal: deviceId };
      } else {
        constraints.facingMode = { ideal: 'environment' };
      }

      return constraints;
    }

    async function loadCamerasIfPossible() {
      try {
        cameras = await Html5Qrcode.getCameras();
      } catch (e) {
        cameras = [];
      }

      cameraSelect.innerHTML = '';

      if (!cameras || cameras.length === 0) {
        cameraControls.style.display = 'none';
        return null;
      }

      cameras.forEach((cam, idx) => {
        const opt = document.createElement('option');
        opt.value = cam.id;
        opt.textContent = cam.label || ('Camera ' + (idx + 1));
        cameraSelect.appendChild(opt);
      });

      cameraControls.style.display = 'flex';

      const preferred = chooseBestBackCamera(cameras);
      if (preferred) cameraSelect.value = preferred.id;
      return preferred ? preferred.id : cameras[0].id;
    }

    function chooseBestBackCamera(list) {
      if (!list || !list.length) return null;

      const lower = list.map(c => ({ ...c, l: (c.label || '').toLowerCase() }));

      // Tránh front/user. Ưu tiên back/rear/environment. Nếu có nhiều camera sau, ưu tiên camera không ghi ultra-wide trước.
      const back = lower.filter(c =>
        (c.l.includes('back') || c.l.includes('rear') || c.l.includes('environment')) &&
        !c.l.includes('front') && !c.l.includes('user')
      );

      const nonUltra = back.find(c => !c.l.includes('ultra'));
      return nonUltra || back[0] || list[0];
    }

    async function startScanner() {
      if (typeof Html5Qrcode === 'undefined') {
        setResult('Lỗi: thư viện html5-qrcode chưa nạp. Kiểm tra kết nối mạng hoặc CDN.', 'error');
        return;
      }

      if (!window.isSecureContext) {
        setResult('Trang chưa chạy trong secure context. Hãy mở bằng link HTTPS của GitHub Pages, không mở bằng file local.', 'error');
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setResult('Trình duyệt này không hỗ trợ camera API. Hãy dùng Chrome Android hoặc Safari iOS mới.', 'error');
        return;
      }

      startBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
      readerContainer.style.display = 'block';
      setResult('Đang xin quyền camera...');

      try {
        const selectedDeviceId = await loadCamerasIfPossible();
        await startWithFallback(selectedDeviceId || null);
        setResult('Sẵn sàng quét. Đưa QR vào khung và giữ máy đứng yên.', 'success');
      } catch (err) {
        console.error('startScanner error:', err);
        setResult(formatCameraError(err), 'error');
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        readerContainer.style.display = 'none';
        zoomControls.style.display = 'none';
        torchBtn.style.display = 'none';
      }
    }

    async function startWithFallback(deviceId) {
      const config = buildScanConfig();
      html5Qr = new Html5Qrcode('reader');

      const attempts = [];
      if (deviceId) attempts.push(buildCameraConstraints(deviceId, true));
      if (deviceId) attempts.push(buildCameraConstraints(deviceId, false));
      attempts.push(buildCameraConstraints(null, false));
      attempts.push({ facingMode: 'environment' });

      let lastErr = null;

      for (const constraints of attempts) {
        try {
          await html5Qr.start(
            constraints,
            config,
            decodedText => onScanSuccess(decodedText),
            () => {}
          );

          setTimeout(() => setupRunningTrackControls(), 350);
          return;
        } catch (e) {
          lastErr = e;
          try {
            if (html5Qr && html5Qr.isScanning) await html5Qr.stop();
          } catch (_) {}
        }
      }

      throw lastErr || new Error('Không mở được camera');
    }

    function formatCameraError(err) {
      const name = err && err.name ? err.name : '';
      const message = err && err.message ? err.message : String(err || '');
      const full = name ? (name + ': ' + message) : message;

      if (full.includes('NotAllowedError') || full.includes('Permission denied')) {
        return 'Không thể truy cập camera: quyền camera đang bị chặn. Hãy bấm biểu tượng ổ khóa trên thanh địa chỉ → Camera → Allow, rồi đóng tab mở lại.';
      }
      if (full.includes('NotFoundError') || full.includes('Requested device not found')) {
        return 'Không tìm thấy camera. Hãy kiểm tra trình duyệt/camera hoặc thử đổi camera.';
      }
      if (full.includes('NotReadableError')) {
        return 'Camera đang bị ứng dụng khác chiếm dụng. Hãy đóng app camera/Zalo/Meet rồi thử lại.';
      }
      if (full.includes('OverconstrainedError')) {
        return 'Camera không đáp ứng được cấu hình độ phân giải/focus yêu cầu. File đã có fallback, hãy thử bấm lại Bật camera.';
      }
      return 'Không thể truy cập camera: ' + full;
    }

    function getRunningVideoTrack() {
      _videoEl = document.querySelector('#reader video');
      if (!_videoEl || !_videoEl.srcObject) return null;
      const tracks = _videoEl.srcObject.getVideoTracks();
      return tracks && tracks.length ? tracks[0] : null;
    }

    async function setupRunningTrackControls() {
      _videoTrack = getRunningVideoTrack();
      _videoEl = document.querySelector('#reader video');

      if (!_videoTrack) return;

      let caps = {};
      try {
        caps = _videoTrack.getCapabilities ? _videoTrack.getCapabilities() : {};
      } catch (e) {
        caps = {};
      }

      // Continuous focus nếu browser/camera hỗ trợ.
      try {
        if (caps.focusMode && Array.isArray(caps.focusMode) && caps.focusMode.includes('continuous')) {
          await _videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
        }
      } catch (e) {
        console.warn('Không set được continuous focus:', e);
      }

      setupZoom(caps);
      setupTorch(caps);
    }

    function setupZoom(caps) {
      supportsZoom = !!(caps && typeof caps.zoom !== 'undefined' && _videoTrack && _videoTrack.applyConstraints);

      if (supportsZoom) {
        const min = caps.zoom.min || 1;
        const max = Math.min(caps.zoom.max || 3, 5);
        const step = caps.zoom.step || 0.1;

        zoomRange.min = min;
        zoomRange.max = max;
        zoomRange.step = step;

        const defaultZoom = Math.min(Math.max(1.8, min), max);
        zoomRange.value = defaultZoom;
        zoomInfo.textContent = `Hỗ trợ ${min}x-${max}x`;
        zoomControls.style.display = 'flex';

        // QR trên thẻ nhỏ: zoom phần cứng mặc định khoảng 1.8x thường dễ bắt hơn.
        _videoTrack.applyConstraints({ advanced: [{ zoom: defaultZoom }] }).catch(()=>{});
      } else {
        zoomRange.min = 1;
        zoomRange.max = 2.5;
        zoomRange.step = 0.05;
        zoomRange.value = 1;
        zoomInfo.textContent = 'Máy không hỗ trợ zoom thật; slider chỉ phóng preview';
        zoomControls.style.display = 'flex';
      }

      zoomRange.oninput = async function() {
        const z = parseFloat(this.value);
        if (supportsZoom && _videoTrack && _videoTrack.applyConstraints) {
          try {
            await _videoTrack.applyConstraints({ advanced: [{ zoom: z }] });
            if (_videoEl) _videoEl.style.transform = '';
          } catch (err) {
            applyCssZoom(z);
          }
        } else {
          applyCssZoom(z);
        }
      };

      zoomReset.onclick = function() {
        const z = supportsZoom ? Math.max(parseFloat(zoomRange.min || '1'), 1) : 1;
        zoomRange.value = z;
        if (supportsZoom && _videoTrack && _videoTrack.applyConstraints) {
          _videoTrack.applyConstraints({ advanced: [{ zoom: z }] }).catch(()=>{});
        }
        applyCssZoom(1);
      };
    }

    function applyCssZoom(z) {
      if (!_videoEl) return;
      _videoEl.style.transform = `scale(${z})`;
      _videoEl.style.transformOrigin = 'center center';
    }

    function setupTorch(caps) {
      supportsTorch = !!(caps && caps.torch && _videoTrack && _videoTrack.applyConstraints);
      torchOn = false;

      if (!supportsTorch) {
        torchBtn.style.display = 'none';
        return;
      }

      torchBtn.style.display = 'inline-block';
      torchBtn.textContent = 'Bật đèn';

      torchBtn.onclick = async function() {
        torchOn = !torchOn;
        try {
          await _videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
          torchBtn.textContent = torchOn ? 'Tắt đèn' : 'Bật đèn';
        } catch (e) {
          torchOn = false;
          torchBtn.textContent = 'Bật đèn';
          setResult('Máy/trình duyệt không cho bật đèn pin qua web. Hãy bật thêm đèn ngoài.', 'warning-box');
        }
      };
    }

    async function stopScanner() {
      if (!html5Qr) {
        setResult('Camera chưa chạy.');
        return;
      }

      try {
        if (_videoTrack && supportsTorch) {
          try { await _videoTrack.applyConstraints({ advanced: [{ torch: false }] }); } catch(e) {}
        }
        await html5Qr.stop();
        html5Qr.clear();
      } catch (err) {
        console.error('stopScanner error:', err);
      } finally {
        html5Qr = null;
        _videoTrack = null;
        _videoEl = null;
        supportsZoom = false;
        supportsTorch = false;
        torchOn = false;

        readerContainer.style.display = 'none';
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        zoomControls.style.display = 'none';
        torchBtn.style.display = 'none';
        setResult('Đã dừng camera.');
      }
    }

    async function switchCamera() {
      if (!cameraSelect.value) return;
      if (html5Qr) await stopScanner();
      setTimeout(startScanner, 150);
    }

    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', stopScanner);
    switchCameraBtn.addEventListener('click', switchCamera);

    window.addEventListener('load', () => {
      if (typeof Html5Qrcode === 'undefined') {
        setResult('Thư viện html5-qrcode chưa nạp. Kiểm tra mạng hoặc CDN.', 'error');
      }
    });
  </script>
</body>
</html>
