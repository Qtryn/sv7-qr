<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quét QR SV7</title>

  <!-- Dùng CDN để tránh lỗi thiếu file local html5-qrcode.min.js trên GitHub Pages -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root {
      --primary: #0b5ed7;
      --muted: #666;
      --ok-bg: #e6f4ea;
      --ok-text: #0b6b2f;
      --err-bg: #fdecea;
      --err-text: #7a1b1b;
      --warn-bg: #fff4d6;
      --warn-text: #7a5200;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      margin: 0;
      padding: 16px;
      background: #f5f7fb;
      color: #111;
    }

    .card {
      max-width: 560px;
      margin: 18px auto;
      background: #fff;
      padding: 16px;
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(12, 20, 30, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.1rem;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    label {
      font-weight: 650;
      font-size: 14px;
    }

    input[type="time"],
    select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d0d7de;
      background: #fff;
      min-height: 38px;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-weight: 750;
      cursor: pointer;
      min-height: 40px;
    }

    button.secondary {
      background: #6c757d;
    }

    button.warning {
      background: #b26a00;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #reader-container {
      margin-top: 14px;
      border-radius: 12px;
      overflow: hidden;
      display: none;
      border: 1px solid #e6e9ee;
      background: #000;
    }

    #reader {
      width: 100%;
      min-height: 360px;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      display: block;
    }

    #result {
      margin-top: 12px;
      padding: 11px;
      border-radius: 8px;
      min-height: 48px;
      font-weight: 650;
      white-space: pre-line;
    }

    .success {
      background: var(--ok-bg);
      color: var(--ok-text);
      border: 1px solid #cfead1;
    }

    .error {
      background: var(--err-bg);
      color: var(--err-text);
      border: 1px solid #f5c6cb;
    }

    .warning-box {
      background: var(--warn-bg);
      color: var(--warn-text);
      border: 1px solid #f3d98b;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.45;
    }

    #camera-tools,
    #zoom-controls {
      display: none;
      margin-top: 10px;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    #zoomRange {
      width: 170px;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
    }

    ul#history {
      margin-top: 12px;
      padding-left: 18px;
      max-height: 180px;
      overflow: auto;
      border-top: 1px dashed #eee;
      padding-top: 8px;
    }

    ul#history li {
      margin-bottom: 6px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>MÁY QUÉT - CHI BỘ SV7</h1>

    <div class="row">
      <label for="startTime">Giờ bắt đầu:</label>
      <input id="startTime" type="time" value="18:00">

      <label for="sheetSelect">Sheet:</label>
      <select id="sheetSelect"></select>
    </div>

    <div class="row">
      <button id="startBtn">Bật camera</button>
      <button id="stopBtn" class="secondary" style="display:none">Dừng</button>
      <button id="switchBtn" class="secondary" style="display:none">Đổi camera</button>
      <button id="torchBtn" class="warning" style="display:none">Bật đèn</button>
    </div>

    <div id="camera-tools">
      <label class="small" for="cameraSelect">Camera:</label>
      <select id="cameraSelect"></select>
    </div>

    <div id="zoom-controls">
      <label class="small" for="zoomRange">Zoom</label>
      <input id="zoomRange" type="range" min="1" max="3" step="0.1" value="1">
      <button id="zoomReset" class="secondary" style="padding:8px 10px">Reset zoom</button>
      <button id="focusBtn" class="secondary" style="padding:8px 10px">Lấy nét lại</button>
    </div>

    <div id="reader-container">
      <div id="reader"></div>
    </div>

    <div id="result">Sẵn sàng quét.</div>

    <div class="hint">
      Mở bằng Chrome/Safari trực tiếp, không mở trong Zalo/Facebook/Messenger.
      Khi quét thẻ thật: để QR cách camera khoảng 15–25 cm, bật đèn, tránh bóng phản chiếu, kéo zoom nếu QR quá nhỏ.
    </div>

    <ul id="history"></ul>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwEygfhTOlc-_MOqXK1G9XLl0JkYlgAheduDK3ZMTCb7VQgrxSBEgvj50jxrqI_W2pY/exec";

    const resultDiv = document.getElementById("result");
    const readerContainer = document.getElementById("reader-container");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const switchBtn = document.getElementById("switchBtn");
    const torchBtn = document.getElementById("torchBtn");
    const cameraTools = document.getElementById("camera-tools");
    const cameraSelect = document.getElementById("cameraSelect");
    const zoomControls = document.getElementById("zoom-controls");
    const zoomRange = document.getElementById("zoomRange");
    const zoomReset = document.getElementById("zoomReset");
    const focusBtn = document.getElementById("focusBtn");
    const sheetSelect = document.getElementById("sheetSelect");
    const historyList = document.getElementById("history");

    const soundSuccess = new Audio("https://actions.google.com/sounds/v1/communication/flick_scuff.ogg");
    const soundError = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

    let html5Qr = null;
    let scannerState = "idle";

    let cameras = [];
    let currentCameraId = "";
    let selectedCameraId = "";
    let isPopulatingCameraSelect = false;

    let videoEl = null;
    let videoTrack = null;
    let supportsZoom = false;
    let supportsTorch = false;
    let torchOn = false;

    let lastScanned = "";
    let scanQueue = [];
    let isUploading = false;
    let resetTimer = null;

    function initSheetSelect() {
      const now = new Date();
      const currentMonth = now.getMonth() + 1;

      for (let i = 1; i <= 12; i++) {
        const opt = document.createElement("option");
        opt.value = "Tháng " + i;
        opt.textContent = "Tháng " + i;
        if (i === currentMonth) opt.selected = true;
        sheetSelect.appendChild(opt);
      }
    }

    function setResult(text, cls) {
      resultDiv.className = cls || "";
      resultDiv.innerText = text;
    }

    function appendHistory(text) {
      const li = document.createElement("li");
      li.textContent = `${new Date().toLocaleTimeString()} — ${text}`;
      historyList.prepend(li);
    }

    function setBusy(isBusy) {
      startBtn.disabled = isBusy;
      stopBtn.disabled = isBusy;
      switchBtn.disabled = isBusy;
      cameraSelect.disabled = isBusy;
      torchBtn.disabled = isBusy;
      zoomRange.disabled = isBusy;
      zoomReset.disabled = isBusy;
      focusBtn.disabled = isBusy;
    }

    function updateButtons() {
      if (scannerState === "idle") {
        startBtn.style.display = "inline-block";
        stopBtn.style.display = "none";
        switchBtn.style.display = cameras.length > 1 ? "inline-block" : "none";
      }

      if (scannerState === "starting") {
        startBtn.style.display = "none";
        stopBtn.style.display = "inline-block";
        switchBtn.style.display = "none";
      }

      if (scannerState === "running") {
        startBtn.style.display = "none";
        stopBtn.style.display = "inline-block";
        switchBtn.style.display = cameras.length > 1 ? "inline-block" : "none";
      }

      if (scannerState === "stopping") {
        startBtn.style.display = "none";
        stopBtn.style.display = "inline-block";
        switchBtn.style.display = "none";
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getQrboxSize() {
      const maxWidth = Math.min(window.innerWidth - 64, 380);
      const size = Math.max(240, Math.floor(maxWidth));
      return { width: size, height: size };
    }

    function getCameraIdOrConfig(cameraId) {
      if (cameraId) {
        return cameraId;
      }

      return { facingMode: "environment" };
    }

    function getScannerConfig() {
      return {
        fps: 15,
        qrbox: getQrboxSize(),
        disableFlip: false,
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: true
        },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.QR_CODE
        ]
      };
    }

    async function startScanner(cameraId) {
      if (scannerState !== "idle") {
        return;
      }

      if (typeof Html5Qrcode === "undefined") {
        setResult("Lỗi: thư viện html5-qrcode chưa nạp được.", "error");
        return;
      }

      if (!window.isSecureContext) {
        setResult(
          "Không thể mở camera vì trang không chạy bằng HTTPS.\nHãy mở bằng link GitHub Pages dạng https://username.github.io/ten-repo/",
          "error"
        );
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setResult("Trình duyệt này không hỗ trợ camera API. Hãy dùng Chrome hoặc Safari mới.", "error");
        return;
      }

      scannerState = "starting";
      setBusy(true);
      updateButtons();
      readerContainer.style.display = "block";
      setResult("Đang mở camera...");

      try {
        html5Qr = new Html5Qrcode("reader", false);

        const cameraIdOrConfig = getCameraIdOrConfig(cameraId || selectedCameraId);
        const scannerConfig = getScannerConfig();

        await html5Qr.start(
          cameraIdOrConfig,
          scannerConfig,
          onScanSuccess,
          function () {
            // Bỏ qua lỗi decode từng frame để không spam màn hình.
          }
        );

        scannerState = "running";
        currentCameraId = cameraId || selectedCameraId || "";
        setResult("Sẵn sàng quét.");
        setBusy(false);
        updateButtons();

        await sleep(300);
        await setupCameraTrackTools();
        await refreshCameraList();

      } catch (err) {
        console.error("startScanner error:", err);

        scannerState = "idle";
        setBusy(false);
        updateButtons();

        readerContainer.style.display = "none";
        zoomControls.style.display = "none";
        torchBtn.style.display = "none";

        const msg = err && (err.message || err.name) ? (err.message || err.name) : String(err);

        if (String(msg).includes("Permission denied") || String(msg).includes("NotAllowedError")) {
          setResult(
            "Không thể truy cập camera: Permission denied.\nBấm biểu tượng ổ khóa trên thanh địa chỉ → Camera → Allow, rồi reload trang.",
            "error"
          );
        } else {
          setResult("Không thể truy cập camera: " + msg, "error");
        }

        try {
          if (html5Qr) {
            html5Qr.clear();
          }
        } catch (e) {}

        html5Qr = null;
      }
    }

    async function stopScanner(keepReaderVisible) {
      if (scannerState !== "running") {
        return;
      }

      scannerState = "stopping";
      setBusy(true);
      updateButtons();
      setResult("Đang dừng camera...");

      try {
        if (html5Qr && html5Qr.isScanning) {
          await html5Qr.stop();
        }

        if (html5Qr) {
          html5Qr.clear();
        }

      } catch (err) {
        console.warn("stopScanner warning:", err);
      }

      html5Qr = null;
      videoEl = null;
      videoTrack = null;
      supportsZoom = false;
      supportsTorch = false;
      torchOn = false;

      scannerState = "idle";
      setBusy(false);
      updateButtons();

      zoomControls.style.display = "none";
      torchBtn.style.display = "none";

      if (!keepReaderVisible) {
        readerContainer.style.display = "none";
        setResult("Đã dừng camera.");
      }
    }

    async function restartScannerWithCamera(cameraId) {
      if (!cameraId) return;
      if (scannerState !== "running") return;

      selectedCameraId = cameraId;

      await stopScanner(true);
      await sleep(400);
      await startScanner(cameraId);
    }

    async function refreshCameraList() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        cameras = devices.filter(d => d.kind === "videoinput");

        isPopulatingCameraSelect = true;
        cameraSelect.innerHTML = "";

        cameras.forEach((cam, index) => {
          const opt = document.createElement("option");
          opt.value = cam.deviceId;
          opt.textContent = cam.label || ("Camera " + (index + 1));
          cameraSelect.appendChild(opt);
        });

        if (videoTrack) {
          const settings = videoTrack.getSettings ? videoTrack.getSettings() : {};
          if (settings.deviceId) {
            currentCameraId = settings.deviceId;
            selectedCameraId = settings.deviceId;
            cameraSelect.value = settings.deviceId;
          }
        }

        isPopulatingCameraSelect = false;

        if (cameras.length > 0) {
          cameraTools.style.display = "flex";
        }

        updateButtons();

      } catch (err) {
        console.warn("refreshCameraList error:", err);
      }
    }

    async function setupCameraTrackTools() {
      videoEl = document.querySelector("#reader video");

      if (!videoEl || !videoEl.srcObject) {
        return;
      }

      videoTrack = videoEl.srcObject.getVideoTracks()[0];

      if (!videoTrack) {
        return;
      }

      try {
        if (videoTrack.applyConstraints) {
          await videoTrack.applyConstraints({
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            frameRate: { ideal: 30, max: 30 }
          });
        }
      } catch (e) {
        console.warn("Không ép được độ phân giải cao, dùng mặc định của thiết bị:", e);
      }

      const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};

      await applyContinuousFocus();

      if (caps.zoom) {
        supportsZoom = true;

        const minZoom = caps.zoom.min || 1;
        const maxZoom = caps.zoom.max || 3;
        const stepZoom = caps.zoom.step || 0.1;

        zoomRange.min = minZoom;
        zoomRange.max = maxZoom;
        zoomRange.step = stepZoom;

        const defaultZoom = Math.min(maxZoom, Math.max(minZoom, 1.6));
        zoomRange.value = defaultZoom;

        zoomControls.style.display = "flex";

        try {
          await videoTrack.applyConstraints({
            advanced: [{ zoom: defaultZoom }]
          });
        } catch (e) {
          console.warn("Initial zoom failed:", e);
        }

      } else {
        supportsZoom = false;
        zoomRange.min = 1;
        zoomRange.max = 3;
        zoomRange.step = 0.1;
        zoomRange.value = 1;
        zoomControls.style.display = "flex";
      }

      if (caps.torch) {
        supportsTorch = true;
        torchBtn.style.display = "inline-block";
      } else {
        supportsTorch = false;
        torchBtn.style.display = "none";
      }
    }

    async function applyContinuousFocus() {
      if (!videoTrack || !videoTrack.getCapabilities || !videoTrack.applyConstraints) {
        return;
      }

      try {
        const caps = videoTrack.getCapabilities();

        if (caps.focusMode && caps.focusMode.includes("continuous")) {
          await videoTrack.applyConstraints({
            advanced: [{ focusMode: "continuous" }]
          });
        }
      } catch (err) {
        console.warn("Focus constraint failed:", err);
      }
    }

    async function applyZoom(value) {
      const z = parseFloat(value);

      if (!videoEl) return;

      if (supportsZoom && videoTrack && videoTrack.applyConstraints) {
        try {
          await videoTrack.applyConstraints({
            advanced: [{ zoom: z }]
          });

          videoEl.style.transform = "";
          videoEl.style.transformOrigin = "";

        } catch (err) {
          console.warn("Hardware zoom failed, fallback to CSS zoom:", err);
          applyCssZoom(z);
        }
      } else {
        applyCssZoom(z);
      }
    }

    function applyCssZoom(z) {
      if (!videoEl) return;
      videoEl.style.transform = `scale(${z})`;
      videoEl.style.transformOrigin = "center center";
    }

    async function toggleTorch() {
      if (!supportsTorch || !videoTrack || !videoTrack.applyConstraints) {
        setResult("Camera hoặc trình duyệt không hỗ trợ bật đèn.", "warning-box");
        return;
      }

      try {
        torchOn = !torchOn;

        await videoTrack.applyConstraints({
          advanced: [{ torch: torchOn }]
        });

        torchBtn.textContent = torchOn ? "Tắt đèn" : "Bật đèn";

      } catch (err) {
        console.warn("Torch failed:", err);
        setResult("Không bật được đèn trên thiết bị này.", "warning-box");
      }
    }

    async function sendGet(mssv, startTime, sheetName) {
      const url =
        APPS_SCRIPT_URL +
        "?mssv=" + encodeURIComponent(mssv) +
        "&startTime=" + encodeURIComponent(startTime || "") +
        "&sheetName=" + encodeURIComponent(sheetName || "");

      try {
        const res = await fetch(url, {
          method: "GET",
          cache: "no-store",
          redirect: "follow"
        });

        const text = await res.text();

        try {
          return JSON.parse(text);
        } catch (jsonErr) {
          return {
            status: "error",
            message: "Server không trả JSON hợp lệ: " + text.slice(0, 200)
          };
        }

      } catch (err) {
        return {
          status: "error",
          message: err.message || String(err)
        };
      }
    }

    async function processQueue() {
      if (scanQueue.length === 0 || isUploading) {
        return;
      }

      isUploading = true;
      const task = scanQueue.shift();

      try {
        const resp = await sendGet(task.mssv, task.startTime, task.sheetName);

        if (resp && resp.status === "ok") {
          setResult(resp.message, "success");

          try {
            soundSuccess.play().catch(() => {});
          } catch (e) {}

          appendHistory(resp.message);

        } else {
          const msg = resp && resp.message ? resp.message : "Lỗi server";
          setResult(msg, "error");

          try {
            soundError.play().catch(() => {});
          } catch (e) {}

          appendHistory("Lỗi: " + msg);
        }

      } catch (err) {
        const msg = err.message || String(err);
        setResult("Lỗi kết nối: " + msg, "error");
        appendHistory("Lỗi kết nối: " + msg);

        try {
          soundError.play().catch(() => {});
        } catch (e) {}

      } finally {
        isUploading = false;

        clearTimeout(resetTimer);
        resetTimer = setTimeout(() => {
          if (scanQueue.length === 0 && scannerState === "running") {
            setResult("Sẵn sàng quét.");
          }
        }, 1800);

        setTimeout(processQueue, 200);
      }
    }

    function onScanSuccess(decodedText) {
      if (!decodedText) return;

      const cleanText = decodedText.toString().trim();

      if (!cleanText) return;

      if (cleanText === lastScanned) {
        return;
      }

      lastScanned = cleanText;

      const startTime = document.getElementById("startTime").value || "";
      const sheetName = sheetSelect.value || "";

      setResult("Đã nhận mã: " + cleanText, "success");

      try {
        soundSuccess.play().catch(() => {});
      } catch (e) {}

      if (navigator.vibrate) {
        navigator.vibrate(100);
      }

      scanQueue.push({
        mssv: cleanText,
        startTime: startTime,
        sheetName: sheetName
      });

      processQueue();

      setTimeout(() => {
        lastScanned = "";
      }, 3000);
    }

    startBtn.addEventListener("click", async () => {
      await startScanner(selectedCameraId);
    });

    stopBtn.addEventListener("click", async () => {
      await stopScanner(false);
    });

    switchBtn.addEventListener("click", async () => {
      if (scannerState !== "running") return;
      if (!cameras || cameras.length < 2) return;

      const currentIndex = cameras.findIndex(c => c.deviceId === currentCameraId);
      const nextIndex = currentIndex >= 0 ? (currentIndex + 1) % cameras.length : 0;
      const nextCameraId = cameras[nextIndex].deviceId;

      await restartScannerWithCamera(nextCameraId);
    });

    cameraSelect.addEventListener("change", async () => {
      if (isPopulatingCameraSelect) return;

      const cameraId = cameraSelect.value;
      selectedCameraId = cameraId;

      if (scannerState === "running") {
        await restartScannerWithCamera(cameraId);
      }
    });

    zoomRange.addEventListener("input", async function () {
      await applyZoom(this.value);
    });

    zoomReset.addEventListener("click", async () => {
      zoomRange.value = 1;
      await applyZoom(1);
    });

    focusBtn.addEventListener("click", async () => {
      await applyContinuousFocus();
      setResult("Đã yêu cầu camera lấy nét lại. Giữ thẻ ổn định 1–2 giây.", "warning-box");

      clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        if (scannerState === "running") setResult("Sẵn sàng quét.");
      }, 1800);
    });

    torchBtn.addEventListener("click", toggleTorch);

    window.addEventListener("load", () => {
      initSheetSelect();

      if (typeof Html5Qrcode === "undefined") {
        setResult("Thư viện html5-qrcode chưa nạp được. Kiểm tra kết nối mạng hoặc CDN.", "error");
      }
    });

    window.addEventListener("beforeunload", () => {
      try {
        if (html5Qr && html5Qr.isScanning) {
          html5Qr.stop();
        }
      } catch (e) {}
    });
  </script>
</body>
</html>
