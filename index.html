<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Quét QR SV7</title>
  <script src="./html5-qrcode.min.js"></script>
  <style>
    body{font-family:Arial; padding:16px; background:#f5f7fb}
    .card{max-width:420px;margin:0 auto;background:#fff;padding:14px;border-radius:8px}
    #reader{width:100%;height:320px;background:#000;border-radius:6px;display:none}
    #result{margin-top:12px;padding:10px;border-radius:6px}
    .success{background:#e6f4ea;color:#0b6b2f}
    .error{background:#fdecea;color:#7a1b1b}
  </style>
</head>
<body>
  <div class="card">
    <h3>Máy quét - Chi bộ SV7</h3>
    Giờ bắt đầu: <input id="startTime" type="time" value="18:00">
    <div style="margin-top:10px">
      <button id="startBtn">Bật camera</button>
      <button id="stopBtn" style="display:none">Dừng</button>
    </div>
    <div id="reader"></div>
    <div id="result">Sẵn sàng quét.</div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxy_yZgeheWco_ADm8QkKOlFVPHFj4H6do0SZf86w6C3kqN1voIvIMokk4qvAY6zAKq/exec";
    const resultDiv = document.getElementById('result');
    const reader = document.getElementById('reader');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    let html5Qr = null;
    let last = "";

    function setResult(text, cls) {
      resultDiv.className = cls || "";
      resultDiv.innerText = text;
    }

    function sendGet(mssv, startTime) {
      // Gọi GET để tránh preflight
      const url = APPS_SCRIPT_URL + '?mssv=' + encodeURIComponent(mssv) + '&startTime=' + encodeURIComponent(startTime);
      return fetch(url).then(r => r.json()).catch(e => ({status:"error", message: e.message || String(e)}));
    }

    function onScanSuccess(decodedText) {
      if (!decodedText) return;
      if (decodedText === last) return;
      last = decodedText;
      const startTime = document.getElementById('startTime').value || "";
      setResult("Đã nhận mã: " + decodedText, "success");
      sendGet(decodedText, startTime).then(resp => {
        if (resp && resp.status === "ok") setResult(resp.message, "success");
        else setResult(resp.message || "Lỗi server", "error");
        setTimeout(()=> setResult("Sẵn sàng quét."), 1500);
      });
      setTimeout(()=> last = "", 2500);
    }

    async function startCamera() {
      if (typeof Html5Qrcode === "undefined") {
        setResult("Lỗi: thư viện html5-qrcode chưa nạp.", "error");
        return;
      }
    
      startBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
      reader.style.display = 'block';
      setResult("Đang xin quyền camera...");
    
      try {
        // Nếu đã lưu deviceId trước đó, dùng luôn
        const savedDeviceId = localStorage.getItem('preferredCameraDeviceId');
    
        // Test quyền nhanh (yêu cầu để enumerateDevices trả label)
        await navigator.mediaDevices.getUserMedia({ video: true }).then(s => s.getTracks().forEach(t => t.stop()));
    
        // Liệt kê thiết bị
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoInputs = devices.filter(d => d.kind === 'videoinput');
    
        // Chọn deviceId ưu tiên: saved -> label chứa back/rear/environment -> first
        let chosenDeviceId = null;
        if (savedDeviceId) {
          // kiểm tra savedDeviceId còn tồn tại trong danh sách
          if (videoInputs.some(d => d.deviceId === savedDeviceId)) {
            chosenDeviceId = savedDeviceId;
          } else {
            // xóa nếu không còn hợp lệ
            localStorage.removeItem('preferredCameraDeviceId');
          }
        }
    
        if (!chosenDeviceId && videoInputs.length) {
          for (const d of videoInputs) {
            const lbl = (d.label || "").toLowerCase();
            if (lbl.includes('back') || lbl.includes('rear') || lbl.includes('environment')) {
              chosenDeviceId = d.deviceId;
              break;
            }
          }
          if (!chosenDeviceId) chosenDeviceId = videoInputs[0].deviceId;
        }
    
        // Khởi Html5Qrcode với deviceId nếu có, ngược lại dùng facingMode
        html5Qr = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 250, height: 250 }, disableFlip: false };
    
        if (chosenDeviceId) {
          // Lưu deviceId làm mặc định cho lần sau
          try { localStorage.setItem('preferredCameraDeviceId', chosenDeviceId); } catch(e){/* ignore */ }
    
          await html5Qr.start(
            { deviceId: { exact: chosenDeviceId } },
            config,
            (decodedText) => onScanSuccess(decodedText),
            (err) => {}
          );
        } else {
          // fallback: facingMode
          await html5Qr.start(
            { facingMode: "environment" },
            config,
            (decodedText) => onScanSuccess(decodedText),
            (err) => {}
          );
        }
    
        setResult("Sẵn sàng quét.");
      } catch (err) {
        console.error("Camera error:", err);
        setResult("Không thể truy cập camera: " + (err.message || err.name), "error");
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        reader.style.display = 'none';
      }
    }


    function stopCamera() {
      if (!html5Qr) { setResult("Camera chưa chạy."); return; }
      html5Qr.stop().then(()=> {
        html5Qr.clear(); html5Qr = null;
        reader.style.display = 'none';
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        setResult("Đã dừng camera.");
      }).catch(e => { console.error(e); setResult("Lỗi khi dừng camera", "error"); });
    }

    startBtn.addEventListener('click', startCamera);
    stopBtn.addEventListener('click', stopCamera);
  </script>
</body>
</html>
