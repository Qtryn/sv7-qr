<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Quét QR SV7</title>

  <!-- Dùng CDN để chạy ổn trên GitHub Pages.
       Không cần đặt html5-qrcode.min.js cùng thư mục nữa. -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root{--primary:#0b5ed7;--muted:#666}
    body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;margin:0;padding:16px;background:#f5f7fb;color:#111}
    .card{max-width:520px;margin:18px auto;background:#fff;padding:16px;border-radius:12px;box-shadow:0 8px 28px rgba(12,20,30,0.06)}
    h1{margin:0 0 8px;font-size:1.05rem}
    .row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
    label{font-weight:600}
    input[type="time"]{padding:6px 8px;border-radius:6px;border:1px solid #d0d7de}
    button{padding:10px 14px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-weight:700;cursor:pointer}
    button.secondary{background:#6c757d}
    button:disabled{opacity:.65;cursor:not-allowed}
    #reader-container{margin-top:12px;border-radius:10px;overflow:hidden;display:none;border:1px solid #e6e9ee}
    #reader{width:100%;min-height:360px;background:#000;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    #reader video{width:100%!important;height:100%!important;object-fit:cover;display:block}
    #result{margin-top:12px;padding:10px;border-radius:8px;min-height:48px;font-weight:600;white-space:pre-line}
    .success{background:#e6f4ea;color:#0b6b2f;border:1px solid #cfead1}
    .error{background:#fdecea;color:#7a1b1b;border:1px solid #f5c6cb}
    .hint{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.45}
    #zoom-controls{margin-top:10px;display:none;align-items:center;gap:8px}
    #zoomRange{width:160px}
    .small{font-size:13px;color:var(--muted)}
    ul#history{margin-top:12px;padding-left:18px;max-height:160px;overflow:auto;border-top:1px dashed #eee;padding-top:8px}
    ul#history li{margin-bottom:6px;font-size:14px}
  </style>
</head>
<body>
  <div class="card">
    <h1>MÁY QUÉT - CHI BỘ SV7</h1>

    <div class="row">
      <label for="startTime">Giờ bắt đầu:</label>
      <input id="startTime" type="time" value="18:00">
    </div>

    <div class="row">
      <button id="startBtn">Bật camera</button>
      <button id="stopBtn" class="secondary" style="display:none">Dừng</button>
      <div id="zoom-controls">
        <label class="small" for="zoomRange">Zoom</label>
        <input id="zoomRange" type="range" min="1" max="3" step="0.05" value="1">
        <button id="zoomReset" class="secondary" style="padding:8px 10px">Reset</button>
      </div>
    </div>

    <div id="reader-container">
      <div id="reader"></div>
    </div>

    <div id="result">Sẵn sàng quét.</div>
    <div class="hint">
      Nên mở bằng Chrome/Safari trực tiếp từ GitHub Pages dạng <b>https://username.github.io/...</b>.
      Không mở từ trang repo GitHub, file local, Facebook/Zalo browser. Camera chỉ chạy trong secure context HTTPS hoặc localhost.
    </div>

    <ul id="history"></ul>
  </div>

  <script>
    // URL exec của Google Apps Script
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxy_yZgeheWco_ADm8QkKOlFVPHFj4H6do0SZf86w6C3kqN1voIvIMokk4qvAY6zAKq/exec";

    const resultDiv = document.getElementById('result');
    const readerContainer = document.getElementById('reader-container');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const zoomControls = document.getElementById('zoom-controls');
    const zoomRange = document.getElementById('zoomRange');
    const zoomReset = document.getElementById('zoomReset');
    const historyList = document.getElementById('history');

    const soundSuccess = new Audio('https://actions.google.com/sounds/v1/communication/flick_scuff.ogg');
    const soundError = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

    let html5Qr = null;
    let lastScanned = "";
    let scanQueue = [];
    let isUploading = false;
    let resetTimer = null;

    let _videoTrack = null;
    let _videoEl = null;
    let supportsZoom = false;

    function setResult(text, cls) {
      resultDiv.className = cls || "";
      resultDiv.innerText = text;
    }

    function appendHistory(text) {
      const li = document.createElement('li');
      li.textContent = `${new Date().toLocaleTimeString()} — ${text}`;
      historyList.prepend(li);
    }

    function explainCameraError(err) {
      const name = err && err.name ? err.name : "";
      const msg = err && err.message ? err.message : String(err || "");

      if (!window.isSecureContext) {
        return "Không thể truy cập camera vì trang chưa chạy bằng HTTPS.\nHãy mở bằng GitHub Pages: https://username.github.io/tên-repo/";
      }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        return "Trình duyệt không hỗ trợ camera API. Hãy dùng Chrome/Edge/Safari bản mới, không dùng trình duyệt trong Zalo/Facebook.";
      }
      if (name === "NotAllowedError" || name === "PermissionDeniedError") {
        return "Bạn đã chặn quyền camera. Hãy bấm biểu tượng ổ khóa trên thanh địa chỉ → Site settings → Camera → Allow, rồi reload trang.";
      }
      if (name === "NotFoundError" || name === "DevicesNotFoundError") {
        return "Không tìm thấy camera trên thiết bị.";
      }
      if (name === "NotReadableError" || name === "TrackStartError") {
        return "Camera đang bị app khác dùng hoặc trình duyệt không mở được camera. Hãy tắt app camera/Meet/Zoom rồi thử lại.";
      }
      if (name === "OverconstrainedError" || name === "ConstraintNotSatisfiedError") {
        return "Camera không đáp ứng cấu hình yêu cầu. Đã thử fallback nhưng vẫn lỗi: " + msg;
      }
      if (name === "SecurityError") {
        return "Trình duyệt chặn camera vì lý do bảo mật. Hãy mở trang bằng HTTPS trực tiếp, không mở trong iframe/app chat.";
      }
      return "Không thể truy cập camera: " + (msg || name || "unknown error");
    }

    function browserPrecheck() {
      if (typeof Html5Qrcode === "undefined") {
        setResult("Lỗi: thư viện html5-qrcode chưa nạp. Kiểm tra kết nối mạng hoặc CDN bị chặn.", "error");
        return false;
      }
      if (!window.isSecureContext) {
        setResult("Camera bị chặn vì trang không chạy trong HTTPS/localhost.\nHãy deploy bằng GitHub Pages và mở URL https://username.github.io/...", "error");
        return false;
      }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setResult("Trình duyệt không hỗ trợ camera API. Hãy dùng Chrome/Edge/Safari bản mới.", "error");
        return false;
      }
      return true;
    }

    async function sendGet(mssv, startTime) {
      const url = APPS_SCRIPT_URL + '?mssv=' + encodeURIComponent(mssv) + '&startTime=' + encodeURIComponent(startTime);
      try {
        const r = await fetch(url, { method: "GET", cache: "no-store" });
        return await r.json();
      } catch (e) {
        return { status: "error", message: e.message || String(e) };
      }
    }

    async function processQueue() {
      if (scanQueue.length === 0 || isUploading) return;
      isUploading = true;
      const task = scanQueue.shift();

      try {
        const resp = await sendGet(task.mssv, task.startTime);
        if (resp && resp.status === "ok") {
          setResult(resp.message, "success");
          soundSuccess.play().catch(()=>{});
          appendHistory(resp.message);
        } else {
          setResult((resp && resp.message) || "Lỗi server", "error");
          soundError.play().catch(()=>{});
          appendHistory((resp && resp.message) || ("Lỗi: " + task.mssv));
        }
      } catch (e) {
        setResult("Lỗi kết nối: " + (e.message || e), "error");
        soundError.play().catch(()=>{});
        appendHistory("Lỗi kết nối: " + (e.message || e));
      } finally {
        isUploading = false;
        clearTimeout(resetTimer);
        resetTimer = setTimeout(() => {
          if (scanQueue.length === 0) setResult("Sẵn sàng quét.");
        }, resultDiv.className === "error" ? 3500 : 1500);

        setTimeout(processQueue, 200);
      }
    }

    function onScanSuccess(decodedText) {
      const text = String(decodedText || "").trim();
      if (!text) return;
      if (text === lastScanned) return;

      lastScanned = text;
      setTimeout(() => { lastScanned = ""; }, 2500);

      const startTime = document.getElementById('startTime').value || "";
      setResult("Đã nhận mã: " + text, "success");
      soundSuccess.play().catch(()=>{});
      if (navigator.vibrate) navigator.vibrate(100);

      scanQueue.push({ mssv: text, startTime });
      processQueue();
    }

    async function tryStartWithConstraints(constraints, config) {
      html5Qr = new Html5Qrcode("reader", { verbose: false });
      await html5Qr.start(
        constraints,
        config,
        onScanSuccess,
        () => {}
      );
    }

    async function startScanner() {
      if (!browserPrecheck()) return;

      startBtn.disabled = true;
      stopBtn.disabled = true;
      startBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
      readerContainer.style.display = 'block';
      setResult("Đang xin quyền camera...");

      const config = {
        fps: 10,
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          const size = Math.floor(Math.min(viewfinderWidth, viewfinderHeight) * 0.75);
          return { width: Math.max(220, Math.min(size, 320)), height: Math.max(220, Math.min(size, 320)) };
        },
        aspectRatio: 1.0,
        disableFlip: false
      };

      const attempts = [
        { facingMode: { exact: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
        { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
        { width: { ideal: 1280 }, height: { ideal: 720 } },
        true
      ];

      let lastErr = null;

      for (const constraints of attempts) {
        try {
          await tryStartWithConstraints(constraints, config);
          setResult("Sẵn sàng quét.");
          startBtn.disabled = false;
          stopBtn.disabled = false;
          setTimeout(enableZoomControls, 300);
          return;
        } catch (err) {
          lastErr = err;
          try {
            if (html5Qr) {
              await html5Qr.clear();
            }
          } catch (_) {}
          html5Qr = null;
        }
      }

      console.error("startScanner error:", lastErr);
      setResult(explainCameraError(lastErr), "error");
      readerContainer.style.display = 'none';
      startBtn.style.display = 'inline-block';
      stopBtn.style.display = 'none';
      startBtn.disabled = false;
      stopBtn.disabled = false;
    }

    async function stopScanner() {
      if (!html5Qr) {
        setResult("Camera chưa chạy.");
        return;
      }

      stopBtn.disabled = true;

      try {
        await html5Qr.stop();
        await html5Qr.clear();
        html5Qr = null;

        readerContainer.style.display = 'none';
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        startBtn.disabled = false;
        stopBtn.disabled = false;

        zoomControls.style.display = 'none';
        applyCssZoom(1);
        _videoTrack = null;
        _videoEl = null;
        supportsZoom = false;

        setResult("Đã dừng camera.");
      } catch (err) {
        console.error("stopScanner error:", err);
        stopBtn.disabled = false;
        setResult("Lỗi khi dừng camera: " + (err.message || err.name || err), "error");
      }
    }

    function applyCssZoom(z) {
      if (!_videoEl) return;
      _videoEl.style.transform = `scale(${z})`;
      _videoEl.style.transformOrigin = 'center center';
    }

    async function enableZoomControls() {
      zoomControls.style.display = 'flex';
      _videoEl = document.querySelector('#reader video');
      if (!_videoEl) return;

      const stream = _videoEl.srcObject;
      if (!stream) return;

      _videoTrack = stream.getVideoTracks()[0];

      try {
        const caps = _videoTrack && _videoTrack.getCapabilities ? _videoTrack.getCapabilities() : {};
        if (caps && typeof caps.zoom !== 'undefined') {
          supportsZoom = true;
          zoomRange.min = caps.zoom.min || 1;
          zoomRange.max = caps.zoom.max || 3;
          zoomRange.step = caps.zoom.step || 0.1;
          zoomRange.value = caps.zoom.min || 1;
        } else {
          supportsZoom = false;
          zoomRange.min = 1;
          zoomRange.max = 3;
          zoomRange.step = 0.05;
          zoomRange.value = 1;
        }

        if (caps.focusMode && caps.focusMode.includes('continuous')) {
          await _videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(()=>{});
        }
      } catch (_) {
        supportsZoom = false;
        zoomRange.min = 1;
        zoomRange.max = 3;
        zoomRange.step = 0.05;
        zoomRange.value = 1;
      }

      zoomRange.oninput = async function() {
        const z = parseFloat(this.value);
        if (supportsZoom && _videoTrack && _videoTrack.applyConstraints) {
          try {
            await _videoTrack.applyConstraints({ advanced: [{ zoom: z }] });
            _videoEl.style.transform = '';
          } catch (_) {
            applyCssZoom(z);
          }
        } else {
          applyCssZoom(z);
        }
      };

      zoomReset.onclick = function() {
        zoomRange.value = 1;
        if (supportsZoom && _videoTrack && _videoTrack.applyConstraints) {
          _videoTrack.applyConstraints({ advanced: [{ zoom: 1 }] }).catch(()=>{});
        }
        applyCssZoom(1);
      };
    }

    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', stopScanner);

    window.addEventListener('load', () => {
      browserPrecheck();
    });
  </script>
</body>
</html>
