<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quét QR - Chi bộ SV7</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.7/minified/html5-qrcode.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:#f5f7fb; margin:0; padding:18px; text-align:center; }
    .card { max-width:420px; margin:0 auto; background:#fff; padding:14px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,0.06); }
    #reader { width:100%; border-radius:8px; overflow:hidden; }
    #result { margin-top:12px; min-height:48px; padding:10px; border-radius:8px; font-weight:600; }
    .success { background:#e6f4ea; color:#0b6b2f; border:1px solid #cfead1; }
    .error { background:#fdecea; color:#7a1b1b; border:1px solid #f5c6c6; }
    button { padding:10px 16px; border-radius:8px; border:none; background:#0b5ed7; color:#fff; font-weight:700; cursor:pointer; }
    input[type="time"] { padding:6px 8px; border-radius:6px; border:1px solid #d0d7de; }
  </style>
</head>
<body>
  <div class="card">
    <h3>Máy quét - Chi bộ SV7</h3>
    <div style="margin:10px 0;">
      <label>Giờ bắt đầu: <input id="startTime" type="time" value="18:00"></label>
    </div>
    <div id="controls">
      <button id="startBtn">Bật camera quét</button>
      <button id="stopBtn" style="display:none;margin-left:8px;background:#6c757d">Dừng</button>
    </div>

    <div id="reader" style="margin-top:12px; display:none;"></div>
    <div id="result">Sẵn sàng quét.</div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDsUBgfOTxcaaKBEGXrLvU0P-IenIIRA26JXvCnzlmDA0zTARXlSix8wmI3GRgDpEt/exec";
    const resultDiv = document.getElementById('result');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const readerEl = document.getElementById('reader');
    let html5Qr = null;
    let lastScanned = "";
    let queue = [];
    let uploading = false;

    function setResult(text, cls) {
      resultDiv.className = cls || "";
      resultDiv.innerText = text;
    }

    async function sendToServer(mssv, startTime) {
      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mssv: mssv, startTime: startTime })
        });
        const j = await res.json();
        return j;
      } catch (e) {
        return { status: "error", message: e.message || String(e) };
      }
    }

    async function processQueue() {
      if (uploading || queue.length === 0) return;
      uploading = true;
      const task = queue.shift();
      const resp = await sendToServer(task.mssv, task.startTime);
      if (resp && resp.status === "ok") {
        setResult(resp.message, "success");
      } else {
        setResult(resp.message || "Lỗi server", "error");
      }
      // Giữ thông báo 2s rồi về sẵn sàng
      setTimeout(() => {
        setResult("Sẵn sàng quét.");
        uploading = false;
        processQueue();
      }, 1800);
    }

    function onScanSuccess(decodedText) {
      if (!decodedText) return;
      if (decodedText === lastScanned) return;
      lastScanned = decodedText;
      const startTime = document.getElementById('startTime').value || "";

      setResult("Đã nhận mã: " + decodedText, "success");
      queue.push({ mssv: decodedText, startTime: startTime });
      processQueue();

      setTimeout(() => { lastScanned = ""; }, 2500);
    }

    async function startCamera() {
      startBtn.style.display = 'none';
      stopBtn.style.display = 'inline-block';
      readerEl.style.display = 'block';
      setResult("Đang xin quyền camera...");

      try {
        // Test quyền nhanh
        const test = await navigator.mediaDevices.getUserMedia({ video: true });
        test.getTracks().forEach(t => t.stop());

        // Liệt kê camera và chọn deviceId nếu cần
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoInputs = devices.filter(d => d.kind === 'videoinput');
        let deviceId = null;
        for (const d of videoInputs) {
          const lbl = (d.label || "").toLowerCase();
          if (lbl.includes('back') || lbl.includes('rear') || lbl.includes('environment')) {
            deviceId = d.deviceId; break;
          }
        }
        if (!deviceId && videoInputs.length) deviceId = videoInputs[0].deviceId;

        html5Qr = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 250, height: 250 }, disableFlip: false };

        await html5Qr.start(
          deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "environment" },
          config,
          (decodedText, decodedResult) => onScanSuccess(decodedText),
          (errorMessage) => { /* decode failure per frame - ignore */ }
        );

        setResult("Sẵn sàng quét.");
      } catch (err) {
        console.error("Camera error:", err);
        setResult("Không thể truy cập camera: " + (err.message || err.name), "error");
        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        readerEl.style.display = 'none';
      }
    }

    function stopCamera() {
      if (html5Qr) {
        html5Qr.stop().then(() => {
          html5Qr.clear();
          html5Qr = null;
          setResult("Đã dừng camera.");
          readerEl.style.display = 'none';
          startBtn.style.display = 'inline-block';
          stopBtn.style.display = 'none';
        }).catch(e => {
          console.error(e);
          setResult("Lỗi khi dừng camera", "error");
        });
      } else {
        setResult("Camera chưa chạy.");
      }
    }

    startBtn.addEventListener('click', startCamera);
    stopBtn.addEventListener('click', stopCamera);

    // Tự động xử lý queue nếu có
    setInterval(processQueue, 800);
  </script>
</body>
</html>
